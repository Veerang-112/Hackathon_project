<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citizen Portal</title>
  <link rel="stylesheet" href="static/citizen.css">
</head>
<body>
  <header>
    <h1>Citizen Interaction Portal</h1>
    <p>Report issues and track transparency</p>
  </header>

  <div class="container">
    <!-- Card 1: File Complaint -->
    <div class="card">
      <h2>File a Complaint</h2>
      <p>Submit your issue directly to the authorities for quick action.</p>
      <button onclick="window.location.href='/file-complaint'">Go to Complaint Form</button>
    </div>

    <!-- Card 2: View Complaints -->
    <div class="card">
      <h2>View Complaints</h2>
      <p>See all submitted complaints and track their resolution status.</p>
      <button onclick="window.location.href='/view-complaints'">See Complaints</button>
    </div>

    
  </div>
</body>
</html>
